<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alpha Hybrid Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #050507; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
    </style>
</head>
<body class="pb-24">

    <div class="p-4 border-b border-white/5 flex justify-between items-center">
        <h1 id="view-title" class="font-bold tracking-tighter uppercase">Market Watch</h1>
        <div id="status" class="text-[9px] font-mono text-emerald-500 uppercase">System: Live</div>
    </div>

    <nav class="flex border-b border-white/5 bg-black/20">
        <button onclick="switchTab('dash')" id="btn-dash" class="flex-1 py-4 text-[10px] font-bold tab-active">WATCH</button>
        <button onclick="switchTab('news')" id="btn-news" class="flex-1 py-4 text-[10px] font-bold text-gray-500">NEWS</button>
    </nav>

    <main id="main-content" class="p-4 space-y-3">
        </main>

    <script>
        const ALPHA_KEY = '01U1F4AACQR9R2OW'; // GET ONE AT ALPHAVANTAGE.CO
        let currentTab = 'dash';

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btn-dash').className = tab === 'dash' ? 'flex-1 py-4 text-[10px] font-bold tab-active' : 'flex-1 py-4 text-[10px] font-bold text-gray-500';
            document.getElementById('btn-news').className = tab === 'news' ? 'flex-1 py-4 text-[10px] font-bold tab-active' : 'flex-1 py-4 text-[10px] font-bold text-gray-500';
            
            if(tab === 'dash') renderDashboard();
            if(tab === 'news') fetchMarketNews();
        }

        function renderDashboard() {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="glass p-4"><p class="text-[9px] text-gray-400">BTC-USD</p><p id="price-BTC-USD" class="text-lg font-mono font-bold">$---</p></div>
                    <div class="glass p-4"><p class="text-[9px] text-gray-400">ETH-USD</p><p id="price-ETH-USD" class="text-lg font-mono font-bold">$---</p></div>
                </div>
                <div class="glass p-4 flex justify-between items-center">
                    <div><p class="text-xs font-bold uppercase">Equity Watch</p><p class="text-[9px] text-gray-500">Manual Refresh for Stocks</p></div>
                    <button onclick="fetchStockPrice('AAPL')" class="text-[9px] bg-blue-600 px-2 py-1 rounded">Update AAPL</button>
                </div>
                <div id="stock-result" class="text-center text-xs text-gray-500 mt-2"></div>
            `;
        }

        async function fetchStockPrice(symbol) {
            const resDisplay = document.getElementById('stock-result');
            resDisplay.innerText = "Fetching...";
            try {
                const r = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${ALPHA_KEY}`);
                const d = await r.json();
                const price = d["Global Quote"]["05. price"];
                resDisplay.innerText = `${symbol}: $${parseFloat(price).toFixed(2)}`;
            } catch (e) {
                resDisplay.innerText = "Rate Limit Hit. Wait 1 min.";
            }
        }

        async function fetchMarketNews() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<p class="text-center text-xs text-gray-500 py-10">Loading News...</p>`;
            try {
                // Alpha Vantage News Sentiment Endpoint
                const r = await fetch(`https://www.alphavantage.co/query?function=NEWS_SENTIMENT&limit=5&apikey=${ALPHA_KEY}`);
                const d = await r.json();
                container.innerHTML = '';
                d.feed.slice(0,5).forEach(n => {
                    container.innerHTML += `
                        <a href="${n.url}" target="_blank" class="block glass p-4 mb-2">
                            <p class="text-[8px] text-blue-400 font-bold uppercase mb-1">${n.source}</p>
                            <h3 class="text-xs font-bold leading-tight">${n.title}</h3>
                        </a>`;
                });
            } catch (e) { container.innerHTML = `<p class="text-red-400 text-xs text-center">News Temporarily Offline.</p>`; }
        }

        // --- CRYPTO FEED ---
        const ws = new WebSocket('wss://ws-feed.exchange.coinbase.com');
        ws.onopen = () => ws.send(JSON.stringify({ type: 'subscribe', product_ids: ['BTC-USD','ETH-USD'], channels: ['ticker'] }));
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if(data.type === 'ticker') {
                const el = document.getElementById(`price-${data.product_id}`);
                if(el) el.innerText = `$${parseFloat(data.price).toLocaleString()}`;
            }
        };

        renderDashboard();
        lucide.createIcons();
    </script>
</body>
</html>
