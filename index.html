<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Terminal v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #050507; color: #fff; font-family: 'Inter', sans-serif; transition: all 0.3s; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="pb-24">

    <div class="p-6 flex justify-between items-center border-b border-white/5">
        <div>
            <h1 id="view-title" class="text-xl font-bold tracking-tighter uppercase">Dashboard</h1>
            <p id="api-status" class="text-[9px] font-mono text-blue-400">COINBASE: CONNECTED</p>
        </div>
        <div class="p-2 glass"><i data-lucide="zap" class="w-4 h-4 text-yellow-500"></i></div>
    </div>

    <nav class="flex border-b border-white/5 bg-black/40 sticky top-0 z-50">
        <button onclick="switchTab('dash')" id="btn-dash" class="flex-1 py-4 text-[10px] font-bold tab-active uppercase">Watchlist</button>
        <button onclick="switchTab('scan')" id="btn-scan" class="flex-1 py-4 text-[10px] font-bold text-gray-500 uppercase">Scanner</button>
        <button onclick="switchTab('news')" id="btn-news" class="flex-1 py-4 text-[10px] font-bold text-gray-500 uppercase">News</button>
    </nav>

    <main id="content-engine" class="p-4 space-y-4">
        </main>

    <nav class="fixed bottom-6 left-4 right-4 glass backdrop-blur-xl p-4 flex justify-around items-center shadow-2xl z-50">
        <button onclick="switchTab('dash')"><i data-lucide="home" class="w-5 h-5 text-gray-400"></i></button>
        <button onclick="switchTab('scan')"><i data-lucide="search" class="w-5 h-5 text-gray-400"></i></button>
        <button onclick="location.reload()" class="bg-blue-600 p-3 rounded-2xl -mt-12 shadow-lg"><i data-lucide="refresh-cw" class="w-5 h-5 text-white"></i></button>
        <button onclick="switchTab('news')"><i data-lucide="book-open" class="w-5 h-5 text-gray-400"></i></button>
        <button onclick="alert('Settings coming soon')"><i data-lucide="user" class="w-5 h-5 text-gray-400"></i></button>
    </nav>

    <script>
        const POLYGON_KEY = '9pYXz9POwy1yGAVDQEcfYdMQfMiVApxu';
        let activeTab = 'dash';

        lucide.createIcons();

        function switchTab(tab) {
            activeTab = tab;
            const engine = document.getElementById('content-engine');
            const title = document.getElementById('view-title');
            
            // UI Toggle logic
            ['dash', 'scan', 'news'].forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                btn.className = (t === tab) ? "flex-1 py-4 text-[10px] font-bold tab-active uppercase" : "flex-1 py-4 text-[10px] font-bold text-gray-500 uppercase";
            });

            title.innerText = tab === 'dash' ? "Dashboard" : (tab === 'scan' ? "Radar Scanner" : "Market News");

            if (tab === 'dash') renderDashboard();
            if (tab === 'scan') renderScanner();
            if (tab === 'news') renderNews();
        }

        function renderDashboard() {
            const engine = document.getElementById('content-engine');
            engine.innerHTML = `
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="glass p-4"><p class="text-[9px] text-gray-500">BTC</p><p id="price-BTC-USD" class="text-lg font-mono font-bold">$---</p></div>
                    <div class="glass p-4"><p class="text-[9px] text-gray-500">ETH</p><p id="price-ETH-USD" class="text-lg font-mono font-bold">$---</p></div>
                </div>
                <div class="glass p-4 flex justify-between items-center border-l-4 border-blue-500">
                    <div><p class="text-sm font-bold">AAPL</p><p class="text-[9px] text-gray-500">APPLE INC</p></div>
                    <p class="text-sm font-mono font-bold text-blue-400">Market Open</p>
                </div>
            `;
        }

        async function renderScanner() {
            const engine = document.getElementById('content-engine');
            engine.innerHTML = `<div class="p-10 text-center animate-pulse text-xs text-gray-500">Booting Radar...</div>`;
            
            try {
                const r = await fetch(`https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/gainers?apiKey=${POLYGON_KEY}`);
                const d = await r.json();
                engine.innerHTML = '<h2 class="text-[10px] font-bold text-gray-500 mb-2 uppercase">Top Volatility (Sells)</h2>';
                d.tickers.slice(0, 5).forEach(t => {
                    engine.innerHTML += `
                        <div class="glass p-4 mb-2 flex justify-between border-r-2 border-red-500">
                            <span class="font-bold text-sm">${t.ticker}</span>
                            <span class="text-red-400 font-mono text-xs">+${t.todaysChangePerc.toFixed(1)}%</span>
                        </div>`;
                });
            } catch (e) { engine.innerHTML = `<div class="glass p-8 text-center text-red-400 text-xs uppercase">API Key Rate Limited. <br>Wait 60 seconds.</div>`; }
        }

        async function renderNews() {
            const engine = document.getElementById('content-engine');
            engine.innerHTML = `<div class="p-10 text-center animate-pulse text-xs text-gray-500">Scanning Headlines...</div>`;
            try {
                const r = await fetch(`https://api.polygon.io/v2/reference/news?limit=5&apiKey=${POLYGON_KEY}`);
                const d = await r.json();
                engine.innerHTML = '';
                d.results.forEach(n => {
                    engine.innerHTML += `
                        <a href="${n.article_url}" target="_blank" class="block glass p-4 mb-3">
                            <p class="text-[8px] text-blue-400 font-bold mb-1 uppercase">${n.source.name}</p>
                            <h3 class="text-xs font-bold leading-snug">${n.title}</h3>
                        </a>`;
                });
            } catch (e) { engine.innerHTML = `<div class="glass p-8 text-center text-red-400 text-xs">News API Blocked.</div>`; }
        }

        // --- CRYPTO FEED ---
        const ws = new WebSocket('wss://ws-feed.exchange.coinbase.com');
        ws.onopen = () => ws.send(JSON.stringify({ type: 'subscribe', product_ids: ['BTC-USD','ETH-USD'], channels: ['ticker'] }));
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if(data.type === 'ticker') {
                const el = document.getElementById(`price-${data.product_id}`);
                if(el) el.innerText = `$${parseFloat(data.price).toLocaleString()}`;
            }
        };

        // Initialize
        switchTab('dash');
    </script>
</body>
</html>
