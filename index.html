<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Strategy Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #050507; font-family: 'Inter', sans-serif; color: #fff; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .indicator-pill { font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }
        .index-card { min-width: 120px; padding: 10px; border-right: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="pb-28">

    <div class="flex overflow-x-auto bg-black/50 border-b border-white/10 no-scrollbar mb-4">
        <div class="index-card">
            <p class="text-[9px] text-gray-500 font-bold uppercase">S&P 500 (SPY)</p>
            <p id="index-SPY" class="text-sm font-mono font-bold text-emerald-400">0.00%</p>
        </div>
        <div class="index-card">
            <p class="text-[9px] text-gray-500 font-bold uppercase">Nasdaq (QQQ)</p>
            <p id="index-QQQ" class="text-sm font-mono font-bold text-emerald-400">0.00%</p>
        </div>
        <div class="index-card">
            <p class="text-[9px] text-gray-500 font-bold uppercase">Dow Jones (DIA)</p>
            <p id="index-DIA" class="text-sm font-mono font-bold text-emerald-400">0.00%</p>
        </div>
    </div>

    <div class="p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-xl font-bold tracking-tighter">Alpha Terminal</h1>
            <div class="p-2 bg-blue-500/10 rounded-full"><i data-lucide="shield-check" class="w-4 h-4 text-blue-400"></i></div>
        </header>

        <nav class="flex gap-8 border-b border-white/5 mb-6">
            <button onclick="switchTab('stocks')" id="btn-stocks" class="pb-2 text-sm font-bold tab-active transition">STOCKS</button>
            <button onclick="switchTab('crypto')" id="btn-crypto" class="pb-2 text-sm font-bold text-gray-500 transition">CRYPTO</button>
        </nav>

        <section id="list-container" class="space-y-3">
            </section>
    </div>

    <nav class="fixed bottom-6 left-4 right-4 glass backdrop-blur-xl p-4 flex justify-around items-center shadow-2xl z-50">
        <i data-lucide="layout-grid" class="w-5 h-5 text-blue-500"></i>
        <i data-lucide="bar-chart-3" class="w-5 h-5 text-gray-500"></i>
        <button onclick="window.location.reload()" class="bg-blue-600 p-3 rounded-2xl -mt-12 border-4 border-[#050507]"><i data-lucide="refresh-cw" class="w-5 h-5"></i></button>
        <i data-lucide="target" class="w-5 h-5 text-gray-500"></i>
        <i data-lucide="settings" class="w-5 h-5 text-gray-500"></i>
    </nav>

    <script>
        const POLYGON_KEY = '9pYXz9POwy1yGAVDQEcfYdMQfMiVApxu';
        let currentTab = 'stocks';

        const alphaData = {
            stocks: [
                { s: 'HRMY', n: 'Harmony Bio', rsi: 32, bb: 'Lower Band' },
                { s: 'LULU', n: 'Lululemon', rsi: 28, bb: 'Oversold' },
                { s: 'AAPL', n: 'Apple Inc', rsi: 55, bb: 'Neutral' },
                { s: 'TSLA', n: 'Tesla Motor', rsi: 68, bb: 'Upper Band' },
                { s: 'NVDA', n: 'NVIDIA Corp', rsi: 72, bb: 'Extreme' }
            ],
            crypto: [
                { s: 'BTC-USD', n: 'Bitcoin', rsi: 45, bb: 'Neutral' },
                { s: 'SOL-USD', n: 'Solana', rsi: 31, bb: 'Lower Band' },
                { s: 'ETH-USD', n: 'Ethereum', rsi: 52, bb: 'Neutral' },
                { s: 'ADA-USD', n: 'Cardano', rsi: 25, bb: 'Oversold' },
                { s: 'PEPE-USD', n: 'Pepe Coin', rsi: 85, bb: 'Extreme' }
            ]
        };

        lucide.createIcons();

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('btn-stocks').className = tab === 'stocks' ? 'pb-2 text-sm font-bold tab-active' : 'pb-2 text-sm font-bold text-gray-500';
            document.getElementById('btn-crypto').className = tab === 'crypto' ? 'pb-2 text-sm font-bold tab-active' : 'pb-2 text-sm font-bold text-gray-500';
            renderList();
        }

        function renderList() {
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            
            alphaData[currentTab].forEach(item => {
                const signal = item.rsi < 35 ? 'BUY' : (item.rsi > 65 ? 'SELL' : 'HOLD');
                const sigClass = signal === 'BUY' ? 'text-emerald-400 bg-emerald-500/10 border-emerald-500/30' : (signal === 'SELL' ? 'text-red-400 bg-red-500/10 border-red-500/30' : 'text-gray-400');

                container.innerHTML += `
                    <div class="glass p-4 flex justify-between items-center animate-fade-in">
                        <div>
                            <p class="text-sm font-bold">${item.s}</p>
                            <p class="text-[9px] text-gray-500 uppercase tracking-tighter">${item.n}</p>
                        </div>
                        <div class="flex items-center gap-4">
                            <div class="text-right">
                                <p class="text-[9px] font-bold text-gray-500 mb-1">RSI: ${item.rsi}</p>
                                <div class="w-16 h-1 bg-white/5 rounded-full overflow-hidden">
                                    <div class="h-full ${item.rsi < 35 ? 'bg-emerald-500' : (item.rsi > 65 ? 'bg-red-500' : 'bg-blue-500')}" style="width: ${item.rsi}%"></div>
                                </div>
                            </div>
                            <span class="indicator-pill ${sigClass}">${signal}</span>
                        </div>
                    </div>
                `;
            });
        }

        // --- FETCH INDEX PERFORMANCE ---
        async function fetchIndices() {
            const symbols = ['SPY', 'QQQ', 'DIA'];
            for (let s of symbols) {
                try {
                    const resp = await fetch(`https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/tickers/${s}?apiKey=${POLYGON_KEY}`);
                    const data = await resp.json();
                    if (data.ticker) {
                        const change = data.ticker.todaysChangePerc.toFixed(2);
                        const el = document.getElementById(`index-${s}`);
                        el.innerText = `${change > 0 ? '+' : ''}${change}%`;
                        el.className = `text-sm font-mono font-bold ${change >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                    }
                } catch (e) { console.log("Index fetch fail"); }
            }
        }

        // --- COINBASE FOR CRYPTO TAB ---
        const ws = new WebSocket('wss://ws-feed.exchange.coinbase.com');
        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'subscribe', product_ids: ['BTC-USD','ETH-USD','SOL-USD'], channels: ['ticker'] }));
        };
        // (Crypto price logic would update the list here)

        // Init
        switchTab('stocks');
        fetchIndices();
        setInterval(fetchIndices, 60000); // Indices update every minute

    </script>
</body>
</html>
