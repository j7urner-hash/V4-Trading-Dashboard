<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Alpha Logic Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #050507; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; }
        .signal-buy { border-left: 4px solid #10b981; background: rgba(16, 185, 129, 0.05); }
        .signal-sell { border-left: 4px solid #ef4444; background: rgba(239, 68, 68, 0.05); }
        .progress-bar { height: 2px; background: #3b82f6; transition: width 0.5s; }
    </style>
</head>
<body class="pb-24">

    <div class="p-6 border-b border-white/5">
        <div class="flex justify-between items-end mb-4">
            <div>
                <h1 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Global Sentiment</h1>
                <p id="sentiment-label" class="text-xl font-black italic">NEUTRAL</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-gray-500 uppercase">System Integrity</p>
                <p class="text-[10px] font-mono text-emerald-500">100.0% STABLE</p>
            </div>
        </div>
        <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
            <div id="sentiment-bar" class="h-full bg-blue-500 w-1/2 transition-all duration-1000"></div>
        </div>
    </div>

    <main id="main-content" class="p-4 space-y-4">
        <div class="flex justify-between items-center px-1">
            <h2 class="text-[10px] font-bold text-gray-400 uppercase">Live Intel Feed</h2>
            <button onclick="autoSequenceScan()" class="text-[9px] text-blue-400 hover:text-blue-300 font-bold uppercase">Run Full Sequence</button>
        </div>
        <div id="ticker-grid" class="space-y-3"></div>
    </main>

    <nav class="fixed bottom-6 left-4 right-4 glass backdrop-blur-xl p-4 flex justify-around items-center z-50">
        <button onclick="switchTab('dash')"><i data-lucide="layout-grid" class="w-5 h-5"></i></button>
        <button id="exec-btn" onclick="executePaperTrade()" class="bg-blue-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter -mt-10 border-4 border-[#050507] shadow-xl">Execute Trade</button>
        <button onclick="switchTab('news')"><i data-lucide="newspaper" class="w-5 h-5 text-gray-400"></i></button>
    </nav>

    <script>
        const ALPHA_KEY = '01U1F4AACQR9R2OW';
        let watchlist = ['AAPL', 'TSLA', 'NVDA'];
        
        lucide.createIcons();

        // 1. SEQUENCE SCAN (The "Limit Buster")
        async function autoSequenceScan() {
            const btn = document.querySelector('button[onclick="autoSequenceScan()"]');
            btn.innerText = "SCANNING...";
            
            for (let ticker of watchlist) {
                await fetchTechnical(ticker);
                // Wait 13 seconds between tickers to stay under 5/min limit perfectly
                await new Promise(r => setTimeout(r, 13000));
            }
            btn.innerText = "RUN FULL SEQUENCE";
        }

        async function fetchTechnical(symbol) {
            try {
                // Fetch RSI
                const r = await fetch(`https://www.alphavantage.co/query?function=RSI&symbol=${symbol}&interval=daily&time_period=14&series_type=close&apikey=${ALPHA_KEY}`);
                const d = await r.json();
                const lastDate = Object.keys(d["Technical Analysis: RSI"])[0];
                const rsi = parseFloat(d["Technical Analysis: RSI"][lastDate]["RSI"]);

                // Fetch Bollinger Bands
                const br = await fetch(`https://www.alphavantage.co/query?function=BBANDS&symbol=${symbol}&interval=daily&time_period=5&series_type=close&nbdevup=2&nbdevdn=2&apikey=${ALPHA_KEY}`);
                const bd = await br.json();
                const bDate = Object.keys(bd["Technical Analysis: BBANDS"])[0];
                const upper = parseFloat(bd["Technical Analysis: BBANDS"][bDate]["Real Upper Band"]);
                const lower = parseFloat(bd["Technical Analysis: BBANDS"][bDate]["Real Lower Band"]);
                
                // Fetch Current Price
                const pr = await fetch(`https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${symbol}&apikey=${ALPHA_KEY}`);
                const pd = await pr.json();
                const price = parseFloat(pd["Global Quote"]["05. price"]);

                updateUI(symbol, rsi, price, upper, lower);
            } catch (e) { console.error("Scan error", e); }
        }

        function updateUI(symbol, rsi, price, upper, lower) {
            const container = document.getElementById(`ticker-${symbol}`);
            const signal = (rsi < 35 && price <= lower) ? 'STRONG BUY' : (rsi > 65 && price >= upper ? 'STRONG SELL' : 'NEUTRAL');
            const sigClass = signal === 'STRONG BUY' ? 'signal-buy' : (signal === 'STRONG SELL' ? 'signal-sell' : '');

            const card = document.getElementById(`card-${symbol}`);
            card.className = `glass p-4 flex justify-between items-center ${sigClass}`;
            card.innerHTML = `
                <div>
                    <p class="text-sm font-bold">${symbol}</p>
                    <p class="text-[9px] text-gray-500 uppercase">RSI: ${rsi.toFixed(1)} | BB: ${price > upper ? 'HIGH' : (price < lower ? 'LOW' : 'MID')}</p>
                </div>
                <div class="text-right">
                    <p class="text-sm font-mono font-bold">$${price.toFixed(2)}</p>
                    <span class="text-[8px] font-black uppercase ${signal.includes('BUY') ? 'text-emerald-500' : (signal.includes('SELL') ? 'text-red-500' : 'text-gray-500')}">${signal}</span>
                </div>
            `;
        }

        function renderWatchlist() {
            const grid = document.getElementById('ticker-grid');
            grid.innerHTML = '';
            watchlist.forEach(s => {
                grid.innerHTML += `<div id="card-${s}" class="glass p-4 flex justify-between items-center"><p class="text-sm font-bold">${s}</p><p class="text-xs text-gray-500 italic">WAITING FOR SCAN...</p></div>`;
            });
        }

        // 2. SENTIMENT METER (Crypto Fear & Greed)
        async function fetchSentiment() {
            const r = await fetch('https://api.alternative.me/fng/');
            const d = await r.json();
            const val = d.data[0].value;
            const label = d.data[0].value_classification;
            
            document.getElementById('sentiment-label').innerText = label.toUpperCase();
            document.getElementById('sentiment-bar').style.width = `${val}%`;
            document.getElementById('sentiment-bar').className = `h-full transition-all duration-1000 ${val > 70 ? 'bg-red-500' : (val < 30 ? 'bg-emerald-500' : 'bg-blue-500')}`;
        }

        // 3. THE EXECUTION ENGINE (Paper Trading Mockup)
        function executePaperTrade() {
            const btn = document.getElementById('exec-btn');
            btn.innerText = "EXECUTING...";
            btn.className = "bg-orange-500 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter -mt-10 border-4 border-[#050507]";
            
            setTimeout(() => {
                btn.innerText = "ORDER FILLED";
                btn.className = "bg-emerald-600 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-tighter -mt-10 border-4 border-[#050507]";
                alert("MOCK ORDER: Bought 10 shares of Market Leader at Market Price.");
            }, 1500);
        }

        renderWatchlist();
        fetchSentiment();
    </script>
</body>
</html>
