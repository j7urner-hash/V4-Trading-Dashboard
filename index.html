<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alpha Terminal Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #050507; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .indicator-pill { font-size: 8px; padding: 2px 6px; border-radius: 4px; font-weight: 800; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="pb-24">

    <div class="p-4 flex justify-between items-center border-b border-white/5">
        <h1 class="text-lg font-bold tracking-tighter" id="view-title">DASHBOARD</h1>
        <div class="flex items-center gap-2">
            <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
            <span class="text-[10px] font-mono text-emerald-500 uppercase">Live</span>
        </div>
    </div>

    <nav class="flex justify-around p-2 border-b border-white/5 bg-black/20">
        <button onclick="switchTab('dash')" id="btn-dash" class="pb-2 text-[10px] font-bold tab-active">WATCH</button>
        <button onclick="switchTab('scan')" id="btn-scan" class="pb-2 text-[10px] font-bold text-gray-500">SCANNER</button>
        <button onclick="switchTab('news')" id="btn-news" class="pb-2 text-[10px] font-bold text-gray-500">NEWS</button>
    </nav>

    <div id="main-content" class="p-4 space-y-3">
        </div>

    <nav class="fixed bottom-6 left-4 right-4 glass backdrop-blur-xl p-4 flex justify-around items-center z-50">
        <button onclick="switchTab('dash')"><i data-lucide="layout-grid"></i></button>
        <button onclick="switchTab('scan')"><i data-lucide="radar"></i></button>
        <button onclick="location.reload()" class="bg-blue-600 p-3 rounded-xl -mt-10"><i data-lucide="refresh-cw" class="text-white"></i></button>
        <button onclick="switchTab('news')"><i data-lucide="newspaper"></i></button>
    </nav>

    <script>
        const POLYGON_KEY = '9pYXz9POwy1yGAVDQEcfYdMQfMiVApxu';
        lucide.createIcons();

        function switchTab(tab) {
            const container = document.getElementById('main-content');
            const title = document.getElementById('view-title');
            
            // UI Toggle
            ['dash', 'scan', 'news'].forEach(t => {
                document.getElementById(`btn-${t}`).classList.toggle('tab-active', t === tab);
                document.getElementById(`btn-${t}`).classList.toggle('text-gray-500', t !== tab);
            });

            if(tab === 'dash') {
                title.innerText = "DASHBOARD";
                renderDashboard();
            } else if(tab === 'scan') {
                title.innerText = "ALPHA RADAR";
                renderScanner();
            } else {
                title.innerText = "MARKET NEWS";
                renderNews();
            }
        }

        function renderDashboard() {
            const container = document.getElementById('main-content');
            container.innerHTML = `
                <div class="glass p-4 mb-2 flex justify-between items-center">
                    <div><p class="text-xs font-bold">BTC-USD</p><p class="text-[9px] text-gray-500">BITCOIN</p></div>
                    <p id="price-BTC-USD" class="text-sm font-mono font-bold">$---.--</p>
                </div>
                <div class="glass p-4 mb-2 flex justify-between items-center">
                    <div><p class="text-xs font-bold">ETH-USD</p><p class="text-[9px] text-gray-500">ETHEREUM</p></div>
                    <p id="price-ETH-USD" class="text-sm font-mono font-bold">$---.--</p>
                </div>
            `;
        }

        async function renderScanner() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<p class="text-center py-10 text-[10px] text-gray-500">SCANNING MARKET EXTREMES...</p>`;
            try {
                // Using 'Gainers' which is most reliable on free tier
                const r = await fetch(`https://api.polygon.io/v2/snapshot/locale/us/markets/stocks/gainers?apiKey=${POLYGON_KEY}`);
                const d = await r.json();
                container.innerHTML = '';
                if(d.tickers) {
                    d.tickers.slice(0, 5).forEach(t => {
                        container.innerHTML += `
                            <div class="glass p-4 flex justify-between items-center border-r-2 border-red-500">
                                <div><p class="text-xs font-bold">${t.ticker}</p><p class="text-[9px] text-red-400">+${t.todaysChangePerc.toFixed(1)}%</p></div>
                                <span class="indicator-pill text-red-400 bg-red-400/10 uppercase">Sell Signal</span>
                            </div>
                        `;
                    });
                }
            } catch (e) { container.innerHTML = `<p class="text-center text-[10px] text-red-400">Scanner Limit Hit. Wait 1 min.</p>`; }
        }

        async function renderNews() {
            const container = document.getElementById('main-content');
            container.innerHTML = `<p class="text-center py-10 text-[10px] text-gray-500">LOADING HEADLINES...</p>`;
            try {
                const r = await fetch(`https://api.polygon.io/v2/reference/news?limit=4&apiKey=${POLYGON_KEY}`);
                const d = await r.json();
                container.innerHTML = '';
                d.results.forEach(n => {
                    container.innerHTML += `
                        <div class="glass p-4 mb-2">
                            <p class="text-[8px] text-blue-400 font-bold uppercase mb-1">${n.source.name}</p>
                            <h3 class="text-xs font-bold leading-tight">${n.title}</h3>
                        </div>
                    `;
                });
            } catch (e) { container.innerHTML = `<p class="text-center text-[10px] text-red-400">News Offline.</p>`; }
        }

        // --- CRYPTO WEBSOCKET ---
        const ws = new WebSocket('wss://ws-feed.exchange.coinbase.com');
        ws.onopen = () => {
            ws.send(JSON.stringify({ type: 'subscribe', product_ids: ['BTC-USD','ETH-USD'], channels: ['ticker'] }));
        };
        ws.onmessage = (e) => {
            const data = JSON.parse(e.data);
            if(data.type === 'ticker') {
                const el = document.getElementById(`price-${data.product_id}`);
                if(el) el.innerText = `$${parseFloat(data.price).toLocaleString()}`;
            }
        };

        // Init
        switchTab('dash');
    </script>
</body>
</html>
